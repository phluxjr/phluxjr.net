  <span class="toggle-icon">&#9776;</span>
</button>
<aside class="sidebar open" id="sidebar">
  <div class="sidebar-inner">
    <div class="sidebar-logo">
      <span class="sidebar-name">phluxjr</span>
    </div>
    <nav class="sidebar-nav">
      <a href="/" class="sidebar-link">
        <span class="sidebar-prefix">~/</span>
      </a>
      <a href="/confy" class="sidebar-link">
        <span class="sidebar-prefix">~/</span>confy
      </a>
      <a href="/links" class="sidebar-link">
        <span class="sidebar-prefix">~/</span>links
      </a>
      <a href="/converter" class="sidebar-link">
        <span class="sidebar-prefix">~/</span>converter
      </a>
      <a href="/writer" class="sidebar-link">

        <span class="sidebar-prefix">~/</span>privacy-policy
      </a>
    </nav>
    <div class="sidebar-spacer"></div>
    <button class="sidebar-theme" id="a11yToggle" aria-label="accessibility options">
      <span>accessibility</span>
    </button>
    <button class="sidebar-theme" id="themeToggle" aria-label="toggle theme">
      <span id="themeLabel">mocha</span>
      <div class="theme-pill" id="themePill"></div>

<div class="a11y-overlay" id="a11yOverlay">
  <div class="a11y-modal">
    <div class="a11y-header">
      <span>accessibility</span>
      <button class="a11y-close" id="a11yClose">✕</button>
    </div>

    <div class="a11y-option">
      <label>background</label>
      <div class="a11y-pills">
        <button class="a11y-pill" data-key="bg" data-val="on">on</button>
        <button class="a11y-pill" data-key="bg" data-val="off">off</button>
      </div>
    </div>

    <div class="a11y-option">
      <label>font</label>
      <div class="a11y-pills">
        <button class="a11y-pill" data-key="font" data-val="default">default</button>
        <button class="a11y-pill" data-key="font" data-val="dyslexic">opendyslexic</button>
      </div>
    </div>

    <div class="a11y-option">
      <label>font size</label>
      <div class="a11y-pills">
	<button class="a11y-pill" data-key="size" data-val="small">small</button>
        <button class="a11y-pill" data-key="size" data-val="default">default</button>
        <button class="a11y-pill" data-key="size" data-val="large">large</button>
      </div>
    </div>




    <div class="a11y-option">
      <label>color scheme</label>
      <div class="a11y-pills">
        <button class="a11y-pill" data-key="scheme" data-val="default">default</button>
        <button class="a11y-pill" data-key="scheme" data-val="dim">dim</button>
        <button class="a11y-pill" data-key="scheme" data-val="contrast">high contrast</button>
      </div>
    </div>

  </div>
</div>
