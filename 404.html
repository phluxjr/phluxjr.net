<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - phluxjr.net</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #0f0;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .background-404 {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      font-size: 48px;
      line-height: 60px;
      opacity: 0.05;
      overflow: hidden;
      pointer-events: none;
      word-wrap: break-word;
      color: #0f0;
    }

    .game-container {
      text-align: center;
      z-index: 10;
    }

    canvas {
      border: 2px solid #0f0;
      display: block;
      margin: 20px auto;
      box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
    }

    .score {
      font-size: 24px;
      margin-bottom: 10px;
      text-shadow: 0 0 10px #0f0;
    }

    .controls {
      font-size: 14px;
      margin-top: 10px;
      opacity: 0.7;
    }

    .message {
      font-size: 18px;
      margin-top: 20px;
      opacity: 0.8;
    }

    a {
      color: #0f0;
      text-decoration: none;
      transition: text-shadow 0.3s;
    }

    a:hover {
      text-shadow: 0 0 10px #0f0;
    }
  </style>
</head>
<body>
<!--#include virtual="/partials/sidebar.html" -->
  <div class="background-404" id="bg404"></div>

  <div class="game-container">
    <div class="score">score: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="controls">use arrow keys or wasd to move</div>
    <div class="message">page not found, but you found snake<br><a href="/">← back to home</a></div>
  </div>

  <script>
    // fill background with 404
    const bg = document.getElementById('bg404');
    let bg404Text = '';
    for (let i = 0; i < 500; i++) {
      bg404Text += '404 ';
    }
    bg.textContent = bg404Text;

    // snake game
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const gridSize = 20;
    const tileCount = canvas.width / gridSize;

    let snake = [
      {x: 10, y: 10}
    ];
    let food = {x: 15, y: 15};
    let dx = 0;
    let dy = 0;
    let score = 0;
    let speed = 667; // starts at 1.5 ups (1000ms / 1.5 = 667ms)

    function drawSnake() {
      snake.forEach((segment, index) => {
        // draw green background
        ctx.fillStyle = '#0f0';
        ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize, gridSize);
        
        // draw black text on top
        ctx.fillStyle = '#000';
        ctx.font = '14px Courier New';
        const digit = index % 3 === 0 ? '4' : (index % 3 === 1 ? '0' : '4');
        ctx.fillText(digit, segment.x * gridSize + 4, segment.y * gridSize + 15);
      });
    }

    function drawFood() {
      ctx.fillStyle = '#f00';
      ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
    }

    function moveSnake() {
      const head = {x: snake[0].x + dx, y: snake[0].y + dy};

      // wrap around edges
      if (head.x < 0) head.x = tileCount - 1;
      if (head.x >= tileCount) head.x = 0;
      if (head.y < 0) head.y = tileCount - 1;
      if (head.y >= tileCount) head.y = 0;

      snake.unshift(head);

      // check food collision
      if (head.x === food.x && head.y === food.y) {
        score++;
        document.getElementById('score').textContent = score;
        placeFood();
        
        // increase speed by 0.5 ups
        speed = Math.max(50, speed - 83); // decrease interval, max out at 50ms
        clearInterval(gameInterval);
        gameInterval = setInterval(gameLoop, speed);
      } else {
        snake.pop();
      }

      // check self collision
      for (let i = 1; i < snake.length; i++) {
        if (head.x === snake[i].x && head.y === snake[i].y) {
          resetGame();
        }
      }
    }

    function placeFood() {
      food.x = Math.floor(Math.random() * tileCount);
      food.y = Math.floor(Math.random() * tileCount);
    }

    function resetGame() {
      snake = [{x: 10, y: 10}];
      dx = 0;
      dy = 0;
      score = 0;
      speed = 667;
      document.getElementById('score').textContent = score;
      placeFood();
      clearInterval(gameInterval);
      gameInterval = setInterval(gameLoop, speed);
    }

    function gameLoop() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      moveSnake();
      drawSnake();
      drawFood();
    }

    // controls
    document.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      
      if ((key === 'arrowup' || key === 'w') && dy === 0) {
        dx = 0;
        dy = -1;
      } else if ((key === 'arrowdown' || key === 's') && dy === 0) {
        dx = 0;
        dy = 1;
      } else if ((key === 'arrowleft' || key === 'a') && dx === 0) {
        dx = -1;
        dy = 0;
      } else if ((key === 'arrowright' || key === 'd') && dx === 0) {
        dx = 1;
        dy = 0;
      }
    });

    let gameInterval = setInterval(gameLoop, speed);
  </script>
</body>
</html>
